<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/styles.css" rel="stylesheet">
    <link href="../static/css/sign_up.css" rel="stylesheet">
    <title>Login</title>
</head>

<body>
    <a class="logo-area" href="/">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 20L20 4M20 4H8M20 4V16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Moonshot</span>
    </a>

    <div class="page-center">
        <div class="form-wrapper">
            <form action="#" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-green">Login</button>
            </form>
            <div class="bottom-links">
                <a href="/register">Create new account</a> | <a href="/reset-password">Reset password</a>
            </div>
        </div>
    </div>

</body>

</html>
