<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
    <title>Sign Up - Moonshot</title>
</head>

<body>
    <a class="logo-area" href="/login">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 20L20 4M20 4H8M20 4V16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Moonshot</span>
    </a>

    <div class="page-center">
        <div class="form-wrapper">
            <form action="#" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-4 d-flex align-items-center gap-2">
                    <input type="checkbox" class="form-check-input m-0" id="is_admin" name="is_admin">
                    <label for="is_admin" class="form-label m-0">Admin account</label>
                </div>
                <button type="submit" class="btn btn-green">Create account</button>
            </form>
            <div class="bottom-links">
                <a href="/login">Already have an account?</a>
            </div>
        </div>
    </div>
</body>

</html>
